server:
  port: 8080

spring:
  application:
    name: cmms-manager
  datasource:
    url: jdbc:postgresql://localhost:5434/cmms-manager-db
    username: admin
    password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
      hibernate.show_sql: false
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: 4UZScpB3jw5o/isHbzaXW2DTRfUwq3K5jl+ggT4wsys=
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000  # 7 dias
  scheduler:
    # Cron para generacion automatica de OTs desde planes de mantenimiento
    # Default: cada hora en punto -> "0 0 * * * *"
    # Para pruebas:               -> "0 * * * * *"  (cada minuto)
    maintenance-cron: "0 0 * * * *"
    # Usuario del sistema usado como creador de OTs automaticas (debe existir en BD)
    system-username: system
    # Limpieza de refresh tokens expirados/revocados (3 AM cada dia)
    refresh-token-cleanup-cron: "0 0 3 * * *"
